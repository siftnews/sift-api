spring:
  # 로컬은 compose.yaml(postgres/mailpit)을 자동 기동/종료
  docker:
    compose:
      enabled: true
      lifecycle-management: start_and_stop

  datasource:
    url: jdbc:postgresql://localhost:5432/sift
    username: sift
    password: sift
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update          # MVP 편의. 추후 Liquibase 마이그레이션으로 전환 권장
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  batch:
    jdbc:
      initialize-schema: always # Spring Batch 메타테이블 자동 생성 (운영은 마이그레이션)

  mail:
    host: localhost
    port: 1025                  # mailpit SMTP (인증 없음)
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
