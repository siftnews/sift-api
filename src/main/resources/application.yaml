spring:
  application:
    name: sift-api

  # 로컬 기본값. 운영/CI는 SPRING_PROFILES_ACTIVE 환경변수로 override
  # 테스트는 @ActiveProfiles("test") + Testcontainers 사용 (local 프로파일 쓰지 말 것)
  profiles:
    active: local

  jpa:
    open-in-view: false       # 환경 무관 공통

  batch:
    job:
      enabled: false          # 부팅 시 Job 자동 실행 금지 (스케줄/트리거로 기동)

management:
  endpoints:
    web:
      exposure:
        include: health, info, modulith   # prometheus는 micrometer 레지스트리 추가 시 노출

logging:
  level:
    org.springframework.modulith: INFO
